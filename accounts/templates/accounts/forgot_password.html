{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | College Connect</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="forgot-container">
    <h2>Forgot Password</h2>

    

    {% if not otp_sent %}
    <!-- STEP 1: Enter Email -->
    <form method="POST" action="{% url 'accounts:forgot_password' %}">
        {% csrf_token %}
        <label for="email">Enter your Email:</label>
        <input type="email" name="email" id="email" required>

        <button type="submit">Send OTP</button>
    </form>

    {% elif otp_sent and not reset_step %}
    <!-- STEP 2: Enter OTP -->
    <form method="POST" action="{% url 'accounts:verify_otp' %}">
        {% csrf_token %}
        <p>OTP sent to {{ email }}.</p>

        <input type="hidden" name="email" value="{{ email }}">

        <label for="otp">Enter OTP:</label>
        <input type="text" name="otp" id="otp" required>

        <button type="submit">Verify OTP</button>
        <br><br>
        <button type="submit" formaction="{% url 'accounts:forgot_password' %}">Resend OTP</button>
    </form>

    {% else %}
    <!-- STEP 3: Reset Password -->
     
    <form method="POST" action="{% url 'accounts:reset_password' %}">
        {% csrf_token %}
    
        <label for="password1">New Password:</label>
        <input 
            type="password" name="password1" id="password1" required
            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[@$!%*?&]).{8,}"
            title="Minimum 8 characters, including uppercase, lowercase, number, and special character."
        >

        <label for="password2">Confirm New Password:</label>
        <input type="password" name="password2" id="password2" required>

        <button type="submit">Reset Password</button>
    </form>
    {% endif %}

</div>

</body>
</html>
